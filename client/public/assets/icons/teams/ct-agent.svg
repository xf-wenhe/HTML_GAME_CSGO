<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="ct-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B69FF"/>
      <stop offset="100%" stop-color="#2B3FBF"/>
    </linearGradient>
  </defs>
  <!-- CT Agent Silhouette - Counter-Terrorist -->
  <g opacity="0.25">
    <!-- Helmet -->
    <ellipse cx="60" cy="32" rx="18" ry="16"/>
    <!-- Visor -->
    <rect x="50" y="28" width="20" height="8" rx="3" opacity="0.5"/>
    <!-- Body armor -->
    <rect x="38" y="50" width="44" height="56" rx="6"/>
    <!-- Shoulder pads -->
    <rect x="28" y="52" width="16" height="28" rx="5"/>
    <rect x="76" y="52" width="16" height="28" rx="5"/>
    <!-- Arms -->
    <rect x="26" y="62" width="14" height="44" rx="5"/>
    <rect x="80" y="62" width="14" height="44" rx="5"/>
    <!-- Legs -->
    <rect x="42" y="106" width="16" height="48" rx="5"/>
    <rect x="62" y="106" width="16" height="48" rx="5"/>
    <!-- Boots -->
    <rect x="40" y="148" width="18" height="8" rx="3"/>
    <rect x="62" y="148" width="18" height="8" rx="3"/>
    <!-- Weapon -->
    <rect x="72" y="70" width="40" height="6" rx="2" opacity="0.6"/>
  </g>
  <!-- Outline -->
  <g stroke="#4B69FF" stroke-width="2.5" fill="none" opacity="0.6">
    <ellipse cx="60" cy="32" rx="18" ry="16"/>
    <rect x="38" y="50" width="44" height="56" rx="6"/>
    <rect x="28" y="52" width="16" height="28" rx="5"/>
    <rect x="76" y="52" width="16" height="28" rx="5"/>
    <rect x="26" y="62" width="14" height="44" rx="5"/>
    <rect x="80" y="62" width="14" height="44" rx="5"/>
    <rect x="42" y="106" width="16" height="48" rx="5"/>
    <rect x="62" y="106" width="16" height="48" rx="5"/>
  </g>
</svg>
