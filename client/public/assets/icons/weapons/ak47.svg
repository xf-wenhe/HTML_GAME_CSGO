<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70">
  <defs>
    <linearGradient id="ak-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C060"/>
      <stop offset="100%" stop-color="#D4942A"/>
    </linearGradient>
  </defs>
  <!-- AK-47: iconic curved magazine, wooden handguard -->
  <g fill="url(#ak-grad)">
    <!-- Barrel -->
    <rect x="2" y="28" width="92" height="10" rx="2.5"/>
    <!-- Gas tube -->
    <rect x="14" y="20" width="70" height="6" rx="2"/>
    <!-- Receiver -->
    <rect x="60" y="22" width="58" height="16" rx="3"/>
    <!-- Curved magazine (iconic AK shape) -->
    <path d="M82 38 Q90 63 98 65 Q108 67 114 63 Q118 58 113 38Z"/>
    <!-- Stock -->
    <rect x="118" y="26" width="68" height="10" rx="4"/>
    <rect x="180" y="26" width="8" height="22" rx="2.5"/>
    <!-- Handguard (wood) -->
    <rect x="20" y="29" width="38" height="9" rx="1.5" opacity="0.85"/>
    <!-- Front sight -->
    <rect x="4" y="18" width="5" height="10" rx="1"/>
    <!-- Rear sight -->
    <rect x="34" y="16" width="4" height="5" rx="1"/>
    <!-- Trigger guard -->
    <path d="M96 38 Q98 48 102 50 Q107 50 108 44 L108 38Z" opacity="0.9"/>
    <!-- Pistol grip -->
    <rect x="108" y="38" width="10" height="28" rx="3"/>
  </g>
</svg>
