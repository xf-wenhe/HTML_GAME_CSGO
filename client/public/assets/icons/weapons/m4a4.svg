<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70">
  <defs>
    <linearGradient id="m4-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C060"/>
      <stop offset="100%" stop-color="#D4942A"/>
    </linearGradient>
  </defs>
  <!-- M4A4: straight magazine, picatinny rail, M4 stock -->
  <g fill="url(#m4-grad)">
    <!-- Barrel -->
    <rect x="2" y="30" width="90" height="9" rx="2"/>
    <!-- Heat shield / handguard -->
    <rect x="14" y="28" width="56" height="14" rx="2" opacity="0.75"/>
    <!-- Receiver -->
    <rect x="68" y="24" width="52" height="18" rx="3"/>
    <!-- Carry handle / rail -->
    <rect x="78" y="16" width="30" height="8" rx="2"/>
    <!-- Straight magazine -->
    <rect x="90" y="42" width="10" height="24" rx="2"/>
    <!-- Stock (M4 style) -->
    <rect x="120" y="28" width="66" height="12" rx="4"/>
    <rect x="176" y="26" width="8" height="22" rx="2.5"/>
    <!-- Front sight -->
    <rect x="6" y="20" width="4" height="10" rx="1"/>
    <!-- Rear sight -->
    <rect x="56" y="18" width="4" height="6" rx="1"/>
    <!-- Trigger guard -->
    <path d="M100 42 Q102 50 106 52 Q110 52 112 46 L112 42Z" opacity="0.85"/>
    <!-- Pistol grip -->
    <rect x="108" y="42" width="10" height="24" rx="3"/>
    <!-- Barrel details -->
    <rect x="40" y="29" width="20" height="11" rx="1.5" opacity="0.5"/>
  </g>
</svg>
